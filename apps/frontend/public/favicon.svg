<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0A0A0B"/>
  <!-- Outer hexagon — established Deadhand brand mark -->
  <polygon
    points="16,3.5 26.1,9.25 26.1,20.75 16,26.5 5.9,20.75 5.9,9.25"
    fill="rgba(212,168,67,0.07)"
    stroke="#D4A843"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <!-- Inner hexagon rotated 30° — creates dual-hex precision mark -->
  <polygon
    points="21.8,16 19,21 13,21 10.2,16 13,11 19,11"
    fill="rgba(212,168,67,0.13)"
    stroke="#D4A843"
    stroke-width="0.8"
    stroke-linejoin="round"
    opacity="0.65"
  />
  <!-- Center decision point — the Deadhand enforcement node -->
  <circle cx="16" cy="16" r="2.2" fill="#D4A843"/>
</svg>
